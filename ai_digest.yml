name: AI 情报日报 → Lark

on:
  schedule:
    # 每天北京时间 09:00（UTC+8 = UTC 01:00）
    - cron: "0 1 * * 1-5"   # 工作日
    # 如需周末也推，改为：0 1 * * *
  workflow_dispatch:         # 允许手动触发

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # Actions 自动注入，无需手动配置
        run: python ai_digest_lark.py
